<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Conferences - Deadlines</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/deadlines.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>🎓 ML Conferences</h1>
      <nav>
        <a href="./deadlines.html" class="active">Deadlines</a>
        <a href="./stats.html">Statistics</a>
        <a href="./papers.html">Papers</a>
        <a href="https://github.com/khairulislam/ML-conferences" class="nav-github" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <!-- Timezone info -->
      <div class="timezone-info" id="timezone-info">
        Times in your local timezone
      </div>

      <!-- Toolbar with filters -->
      <div class="toolbar">
        <!-- View mode toggle -->
        <div class="toggle-group">
          <label class="toggle">
            <input type="radio" name="view-mode" value="all" id="toggle-all">
            <span>All</span>
          </label>
          <label class="toggle">
            <input type="radio" name="view-mode" value="active" id="toggle-active" checked>
            <span>Active Only</span>
          </label>
        </div>

        <!-- Category chips -->
        <div class="chip-group">
          <label class="chip" data-category="ML">
            <input type="checkbox" value="ML">
            <span>ML & AI</span>
          </label>
          <label class="chip" data-category="CV">
            <input type="checkbox" value="CV">
            <span>Computer Vision</span>
          </label>
          <label class="chip" data-category="NLP">
            <input type="checkbox" value="NLP">
            <span>NLP</span>
          </label>
          <label class="chip" data-category="DM">
            <input type="checkbox" value="DM">
            <span>Data Mining</span>
          </label>
          <label class="chip" data-category="SE">
            <input type="checkbox" value="SE">
            <span>Software Engineering</span>
          </label>
        </div>
      </div>

      <!-- Conference list -->
      <div id="conference-list" class="conference-list">
        <!-- Dynamically populated by JavaScript -->
        <div class="loading">Loading conferences...</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Built and maintained by <a href="https://khairulislam.github.io" target="_blank" rel="noopener">Md Khairul Islam</a></p>
    </div>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
