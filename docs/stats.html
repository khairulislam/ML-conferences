<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Conferences - Statistics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/stats.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>🎓 ML Conferences</h1>
      <nav>
        <a href="./deadlines.html">Deadlines</a>
        <a href="./stats.html" class="active">Statistics</a>
        <a href="./papers.html">Papers</a>
        <a href="https://github.com/khairulislam/ML-conferences" class="nav-github" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h2>Conference Statistics</h2>

      <!-- Toolbar -->
      <div class="toolbar">
        <!-- Category filter (exclusive selection) - populated by JavaScript -->
        <div class="category-filter">
        </div>

        <!-- Conference search and filter chips -->
        <div class="conference-filter">
          <div class="conference-search-row">
            <span class="search-icon">🔍</span>
            <input type="text" id="conference-search" class="conference-search-input"
                   placeholder="Search conferences...">
          </div>
          <div class="conference-chips" id="conference-chips">
            <!-- Populated by JavaScript -->
          </div>
        </div>

        <!-- Year range filter -->
        <div class="year-group">
          <label class="toggle-label">Years:</label>
          <div class="year-inputs">
            <input type="number" id="year-min" class="year-input" min="2010" max="2026" value="2018" placeholder="From">
            <span class="year-separator">-</span>
            <input type="number" id="year-max" class="year-input" min="2010" max="2026" value="2026" placeholder="To">
          </div>
        </div>
      </div>

      <!-- Chart section -->
      <div class="chart-section">
        <div class="chart-container">
          <canvas id="trend-chart"></canvas>
        </div>
        <div class="chart-legend" id="chart-legend">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <!-- Conference Info section -->
      <div class="conference-info">
        <h3>Conference Info</h3>
        <div class="stats-list" id="stats-list">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-state-icon">🔍</div>
        <h3 class="empty-state-title">No statistics found</h3>
        <p class="empty-state-text">Try adjusting your filters to see more data.</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Built and maintained by <a href="https://khairulislam.github.io" target="_blank" rel="noopener">Md Khairul Islam</a></p>
    </div>
  </footer>

  <script type="module" src="./js/stats.js"></script>
</body>
</html>
